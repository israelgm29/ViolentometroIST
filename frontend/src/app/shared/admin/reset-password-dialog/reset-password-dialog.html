<h2 mat-dialog-title>Restablecer contraseña</h2>
<mat-dialog-content>
    <p>Estás cambiando la contraseña para: <strong>{{data.name}}</strong></p>
    <form [formGroup]="passwordForm">
        <mat-form-field appearance="outline" class="full-width">
            <mat-label>Nueva Contraseña</mat-label>
            <input matInput [type]="hide ? 'password' : 'text'" formControlName="newPassword">
            <button mat-icon-button matSuffix (click)="hide = !hide" type="button">
                <mat-icon>{{hide ? 'visibility_off' : 'visibility'}}</mat-icon>
            </button>
            <mat-error>Mínimo 8 caracteres</mat-error>
        </mat-form-field>
    </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()">Cancelar</button>
    <button mat-raised-button color="primary" [disabled]="passwordForm.invalid" (click)="onSave()">
        Actualizar Contraseña
    </button>
</mat-dialog-actions>
