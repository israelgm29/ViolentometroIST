<div class="dashboard-container">
    <div class="dashboard-header">
        <h1 class="mat-headline-5">Configuración de Catálogos</h1>
        <button mat-raised-button color="primary" (click)="openDialog()">
            <mat-icon>add</mat-icon> Nuevo Registro
        </button>
    </div>

    <mat-tab-group (selectedIndexChange)="onTabChange($event)">
        <mat-tab label="Regiones (Provincias)"></mat-tab>
        <mat-tab label="Discapacidades"></mat-tab>
        <mat-tab label="Etnias"></mat-tab>
        <mat-tab label="Generos"></mat-tab>
    </mat-tab-group>

    <mat-card class="table-card mt-3">
        <table mat-table [dataSource]="dataSource">

            <ng-container matColumnDef="name">
                <th mat-header-cell *matHeaderCellDef> Nombre </th>
                <td mat-cell *matCellDef="let element"> {{element.name}} </td>
            </ng-container>

            <ng-container matColumnDef="actions">
                <th mat-header-cell *matHeaderCellDef> Acciones </th>
                <td mat-cell *matCellDef="let element">
                    <button mat-icon-button color="accent" (click)="openDialog(element)">
                        <mat-icon>edit</mat-icon>
                    </button>
                    <button mat-icon-button color="warn" (click)="deleteElement(element.id)">
                        <mat-icon>delete</mat-icon>
                    </button>
                </td>
            </ng-container>

            <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
            <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
        </table>
    </mat-card>
</div>
